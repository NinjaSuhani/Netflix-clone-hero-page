<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix-clone</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="hero">
      <div class="navbar">
        <h1 class="logo">NETFLIX</h1>
        <div class="nav-buttons">
          <button class="language">English</button>
          <button class="language">Sign In</button>
        </div>
      </div>
      <!-- Hero content -->
      <div class="hero-content">
        <h1>
          Unlimited movies,<br />shows,<br />
          and more
        </h1>
        <h3>Starts at ₹149. Cancel at any time.</h3>
        <p>
          Ready to watch? Enter your email to create or restart your membership.
        </p>
        <div class="email-box">
            <input type="email" placeholder="Email address">
            <button class="ger-started">Get Started</button>
        </div>
      </div>
    </section>
  </body>
</html>
